<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Workflow Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #151515;
      --surface-hover: #1c1c1c;
      --border: #222;
      --border-hover: #333;
      --text: #e8e8e8;
      --text-muted: #777;
      --accent: #c9ff57;
      --accent-dim: rgba(201, 255, 87, 0.08);
      --radius: 16px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    body {
      padding: env(safe-area-inset-top) 20px 20px 20px;
      min-height: 100dvh;
    }

    /* Header */
    .header {
      padding: 48px 0 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .header .accent-dot {
      color: var(--accent);
    }

    .header p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    /* Tile */
    .tile {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }

    .tile:active {
      transform: scale(0.97);
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .tile-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .tile-label {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }

    .tile-desc {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .tile-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      margin-top: auto;
    }

    .tile-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* Add-new tile */
    .tile--add {
      border-style: dashed;
      border-color: #2a2a2a;
      background: transparent;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      gap: 10px;
    }

    .tile--add .plus {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px dashed #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--text-muted);
    }

    .tile--add span {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      padding: 20px 0;
      text-align: center;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: #333;
    }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tile {
      animation: fadeUp 0.4s ease both;
    }

    .tile:nth-child(1) { animation-delay: 0.05s; }
    .tile:nth-child(2) { animation-delay: 0.1s; }
    .tile:nth-child(3) { animation-delay: 0.15s; }
    .tile:nth-child(4) { animation-delay: 0.2s; }

    /* Wide tile variant */
    .tile--wide {
      grid-column: 1 / -1;
    }

    @media (min-width: 400px) {
      .grid { gap: 14px; }
      .tile { padding: 22px 18px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>Workflow Hub<span class="accent-dot">.</span></h1>
    <p id="workflow-count">1 workflow aktiv</p>
  </header>

  <main class="grid">

    <!-- Workflow: Auto Reinigung -->
    <a href="workflows/auto-reinigung.html" class="tile">
      <div class="tile-icon">🚗</div>
      <div>
        <div class="tile-label">Auto Reinigung</div>
        <div class="tile-desc">Schritt-für-Schritt Pflege-Workflow</div>
      </div>
      <div class="tile-status">aktiv</div>
    </a>

    <!-- Placeholder: Neuen Workflow hinzufügen -->
    <div class="tile tile--add" onclick="alert('Neue Workflow-HTML in /workflows/ ablegen und hier verlinken.')">
      <div class="plus">+</div>
      <span>Workflow hinzufügen</span>
    </div>

  </main>

  <footer class="footer">
    workflow hub · github pages pwa
  </footer>

  <script>
    // Register Service Worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>

</body>
</html>
