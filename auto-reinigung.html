<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <title>Auto Reinigung – Workflow Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #151515;
      --border: #222;
      --text: #e8e8e8;
      --text-muted: #777;
      --accent: #c9ff57;
      --accent-dim: rgba(201, 255, 87, 0.08);
      --radius: 14px;
    }

    html, body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      padding: 20px;
      padding-top: env(safe-area-inset-top, 20px);
      min-height: 100dvh;
    }

    /* Back link */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 0;
      margin-bottom: 24px;
    }

    .back:active { color: var(--accent); }

    .back svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 24px;
    }

    .placeholder {
      background: var(--surface);
      border: 1px dashed #2a2a2a;
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .placeholder em {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: #444;
    }
  </style>
</head>
<body>

  <a href="../index.html" class="back">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    hub
  </a>

  <h1>🚗 Auto Reinigung</h1>

  <div class="placeholder">
    Hier kommt dein Workflow-Inhalt hin.<br>
    Ersetze diesen Platzhalter mit deiner HTML.
    <em>workflows/auto-reinigung.html</em>
  </div>

</body>
</html>
